services:

  proxy:
    build:
      context: ../..
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
      - "${PROXY_HTTPS_PORT:-8443}:443"
    env_file:
      - .env
    environment:
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME:-localhost}
    volumes:
      - ./ssl:/etc/apache2/ssl:ro
      - ./sites-enabled:/etc/apache2/sites-enabled:ro
      - ./AddOn:/etc/apache2/AddOn:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "exec redis-server --save '' --appendonly no
      --maxmemory 128mb --maxmemory-policy allkeys-lru
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1}
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname=https://${KEYCLOAK_HOST:-keycloak.127.0.0.1.nip.io}:${PROXY_HTTPS_PORT:-8443}
      - --proxy-headers=xforwarded
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - backend

  whoami:
    image: traefik/whoami:v1.10
    restart: unless-stopped
    networks:
      - backend

networks:
  frontend:
    driver: bridge

  backend:
    driver: bridge
