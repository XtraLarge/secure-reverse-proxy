# Test configuration — exercises all VHost_* macros
# Uses test.example.com with self-signed certs from tests/ssl/
# Backend IPs are internal dummy addresses (127.0.0.x) — no real services needed
# Apache only needs to parse and validate the config, not connect to backends.

USE Domain_Init test.example.com www

# VHost_Alias (2 params after domain)
Use VHost_Alias  www       test.example.com  https://cms.test.example.com
Use VHost_Alias  redirect  test.example.com  https://external.example.com

# VHost_Proxy_OIDC_User — specific users (claim-restricted, 4 params)
Use VHost_Proxy_OIDC_User  mgmt     test.example.com  http://127.0.0.2:9000/  'alice|bob'
Use VHost_Proxy_OIDC_User  admin    test.example.com  http://127.0.0.2:8080/  'alice'

# VHost_Proxy_OIDC_Any — any authenticated user (3 params)
Use VHost_Proxy_OIDC_Any  monitor  test.example.com  http://127.0.0.2:3000/

# VHost_Proxy_Basic — HTTP Basic auth (5 params)
Use VHost_Proxy_Basic  cam  test.example.com  http://127.0.0.2:8081/  user  'camuser'

# VHost_Proxy — no auth (5 params)
Use VHost_Proxy  public   test.example.com  http://127.0.0.2:8082/
Use VHost_Proxy  idp-admin test.example.com https://127.0.0.2:8443/
Use VHost_Proxy  idp      test.example.com  https://127.0.0.2:9444/
Use VHost_Proxy  files    test.example.com  http://127.0.0.2:11000/
Use VHost_Proxy  office   test.example.com  https://127.0.0.2:9980/
Use VHost_Proxy  backup   test.example.com  https://127.0.0.2:8007/
Use VHost_Proxy  scanner  test.example.com  https://127.0.0.2:8006/
Use VHost_Proxy  cluster  test.example.com  https://127.0.0.2:9443/

USE Domain_Final test.example.com www
