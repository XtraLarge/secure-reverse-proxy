services:

  proxy:
    build: .
    # image: xtralarge71/apache-oidc-proxy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      # TLS certificates — one subdirectory per domain:
      #   ssl/<domain>/cert.pem
      #   ssl/<domain>/key.pem
      #   ssl/<domain>/fullchain.pem
      - ./ssl:/etc/apache2/ssl:ro

      # User-Site configs — copy from conf/sites-available/example.conf
      # and adapt. See .env for available environment variables.
      - ./sites:/etc/apache2/sites:rw

      # Optional per-vhost Apache include snippets, e.g.:
      #   AddOn/example.com/mysite.pre.conf
      - ./AddOn:/etc/apache2/AddOn:rw

      # Runtime config — basic.htpasswd, extra-countries.conf, oidc-clients/
      - ./config:/etc/apache2/config:rw
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    healthcheck:
      # HTTP check — detects zombie workers that no longer accept connections.
      # `ps -C apache2` would pass even for defunct processes; curl does not.
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://localhost/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No persistence needed — Redis is used as OIDC session cache only.
    # Sessions are re-created on restart via re-authentication.
    #
    # REDIS_PASSWORD: set in .env to enable password authentication.
    # If unset, Redis runs without authentication (only accessible via the
    # internal Docker network — not exposed to the host).
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "exec redis-server --save '' --appendonly no
      --maxmemory 128mb --maxmemory-policy allkeys-lru
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1}
    profiles:
      - keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname=https://${KEYCLOAK_HOST:-keycloak.example.com}
      - --proxy-headers=xforwarded
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./config/realm-oidcproxy.json:/opt/keycloak/data/import/realm-oidcproxy.json:ro
    networks:
      - backend

networks:
  # frontend: accepts inbound connections on ports 80/443
  frontend:
    driver: bridge

  # backend: internal-only network for proxy↔redis communication.
  # Containers on this network cannot reach the internet.
  backend:
    driver: bridge
    internal: true
