name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

# Minimal required permissions (H-4: least-privilege principle)
permissions:
  contents: read

jobs:
  build-and-push:
    # Pinned to a specific Ubuntu LTS release, not floating ubuntu-latest (L-5)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # Pin to commit SHA, not a mutable tag (H-4)
        # SHA corresponds to actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/apache-oidc-proxy
          tags: |
            # master branch → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # version tags v1.2.3 → :1.2.3 and :1.2 and :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short git SHA for traceability
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build cache — speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max
