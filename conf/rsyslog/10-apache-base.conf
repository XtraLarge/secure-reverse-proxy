# ── rsyslog: Apache log format ────────────────────────────────────────────────
# This file is always present.  The routing rules (file / remote) are written
# to /etc/rsyslog.d/50-apache-routing.conf by entrypoint.sh at container start.

# Format: ISO timestamp + syslog tag (contains vhost name) + message
$template ApacheFmt,"%timegenerated:::date-rfc3339% %syslogtag%%msg%\n"
