# ── Common macros ─────────────────────────────────────────────────────────────
#
# These macros are used internally by the VHost_Proxy_* macros.
# You can USE them directly in your site configs too.

# LOGGING $(SITENAME) $(DOMAINNAME)
# Sets up per-vhost error and access logging.
<Macro LOGGING $(SITENAME) $(DOMAINNAME)>
  LogLevel error
  ErrorLog ${APACHE_LOG_DIR}/$(DOMAINNAME)/$(SITENAME)_error.log
  LogFormat "%v %a %{GEOIP_COUNTRY_CODE}e %l %u %t \"%r\" %>s %b" geo
  CustomLog /var/log/apache2/geo_access.log geo
</Macro>

# DEFAULTS
# Sets sensible defaults for all vhosts.
<Macro DEFAULTS>
  UseCanonicalPhysicalPort Off
  UseCanonicalName Off
  DocumentRoot /var/www/html/
</Macro>

# SSL $(DOMAINNAME)
# Enables TLS using certificates from /etc/apache2/ssl/$(DOMAINNAME)/.
# Mount your certs into that path via the ssl/ volume.
<Macro SSL $(DOMAINNAME)>
  SSLEngine on
  SSLProtocol -all +TLSv1.2 +TLSv1.3
  SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256
  SSLHonorCipherOrder off
  # No RemoteIPHeader — this proxy is the outermost entry point with no trusted
  # upstream proxy. Trusting X-Forwarded-For without restriction would allow any
  # client to spoof their IP and bypass GeoIP/OIDC access controls.
  SSLCertificateFile    /etc/apache2/ssl/$(DOMAINNAME)/cert.pem
  SSLCertificateKeyFile /etc/apache2/ssl/$(DOMAINNAME)/key.pem
  SSLCertificateChainFile /etc/apache2/ssl/$(DOMAINNAME)/fullchain.pem
</Macro>

# SECURITY_HEADERS
# Adds recommended security response headers to a vhost.
# Include this in every HTTPS vhost.
#
# CSP note: setifempty means backends that set their own CSP are not overridden.
# The fallback is intentionally permissive so it works across diverse backends —
# it is a safety net, not a strict policy. Tighten per-vhost via AddOn preconfigs.
<Macro SECURITY_HEADERS>
  Header always set   Strict-Transport-Security "max-age=31536000; includeSubDomains"
  Header always set   X-Frame-Options           "SAMEORIGIN"
  Header always set   X-Content-Type-Options    "nosniff"
  Header always set   Referrer-Policy           "strict-origin-when-cross-origin"
  Header always setifempty Content-Security-Policy \
    "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'self'"
  Header always setifempty Permissions-Policy \
    "geolocation=(), microphone=(), camera=(), payment=()"
</Macro>

# PROXY $(DESTINATION)
# Configures Apache as a reverse proxy to $(DESTINATION) (e.g. http://10.0.0.1:8080/).
# Handles WebSocket upgrades, long timeouts, and encoded slashes.
# TLS certificates on the backend are verified. For backends with self-signed
# certificates, use PROXY_NOVERIFY instead and document the exception.
<Macro PROXY $(DESTINATION)>
  SSLProxyEngine on
  ProxyRequests off
  AllowEncodedSlashes On
  Timeout 60
  ProxyTimeout 60
  KeepAlive On
  <Proxy *>
    Require all granted
  </Proxy>

  # Strip any client-supplied X-Forwarded-For before proxying.
  # mod_proxy appends the real client IP, so backends see a trusted single value.
  RequestHeader unset X-Forwarded-For

  # Never proxy ACME challenge — handle locally for cert renewal
  ProxyPass ^/\.well\-known/acme-challenge/ !

  ProxyPass        / $(DESTINATION) upgrade=ANY connectiontimeout=60 timeout=60 keepalive=on
  ProxyPassReverse / $(DESTINATION)
</Macro>

# PROXY_NOVERIFY $(DESTINATION)
# Same as PROXY but disables TLS certificate verification for the backend.
# Use only for backends with known self-signed certificates on trusted internal
# networks. Document each use with a comment explaining why.
<Macro PROXY_NOVERIFY $(DESTINATION)>
  SSLProxyEngine on
  SSLProxyVerify none
  SSLProxyCheckPeerCN off
  SSLProxyCheckPeerName off
  SSLProxyCheckPeerExpire off
  ProxyRequests off
  AllowEncodedSlashes On
  Timeout 60
  ProxyTimeout 60
  KeepAlive On
  <Proxy *>
    Require all granted
  </Proxy>

  # Strip any client-supplied X-Forwarded-For before proxying.
  RequestHeader unset X-Forwarded-For

  # Never proxy ACME challenge — handle locally for cert renewal
  ProxyPass ^/\.well\-known/acme-challenge/ !

  ProxyPass        / $(DESTINATION) upgrade=ANY connectiontimeout=60 timeout=60 keepalive=on
  ProxyPassReverse / $(DESTINATION)
</Macro>

# REWRITE2URL $(URL)
# Redirects all traffic (except ACME challenges) to $(URL).
# Used for HTTP→HTTPS redirects and domain consolidation.
<Macro REWRITE2URL $(URL)>
  RedirectMatch 307 ^\/((?!\.well\-known\/acme-challenge).*)$ $(URL)
</Macro>

# TRAILINGSLASH
# Appends a trailing slash to directory URLs.
<Macro TRAILINGSLASH>
  RewriteEngine On
  RewriteCond $1 !/$
  RewriteCond %(REQUEST_FILENAME)/ -d
  RewriteRule ^.*[^/]$ /$0/ [L,R=302]
</Macro>

# HOSTREWRITE2SEC $(SITENAME) $(DOMAINNAME)
# Creates an HTTP vhost that redirects to HTTPS for the given site.
<Macro HOSTREWRITE2SEC $(SITENAME) $(DOMAINNAME)>
  <VirtualHost *:80>
    ServerName $(SITENAME).$(DOMAINNAME)
    USE LOGGING $(SITENAME) $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://$(SITENAME).$(DOMAINNAME)"
  </VirtualHost>
</Macro>

# AUTHCOOKIE $(DOMAINNAME) $(COOKIEAGE)
# Enables Apache session module with a secure domain-wide cookie.
<Macro AUTHCOOKIE $(DOMAINNAME) $(COOKIEAGE)>
  Session On
  SessionCookieName ProxyAuth path=/;domain=.$(DOMAINNAME);httponly;secure
  SessionMaxAge $(COOKIEAGE)
</Macro>

# VHOST_ALIAS $(FROMHOST) $(DOMAINNAME) $(TOHOST)
# Creates an HTTP+HTTPS vhost pair that redirects to $(TOHOST).
# Useful for aliasing subdomains to external URLs.
<Macro VHOST_ALIAS $(FROMHOST) $(DOMAINNAME) $(TOHOST)>
  <VirtualHost *:80>
    ServerName $(FROMHOST).$(DOMAINNAME)
    USE LOGGING $(FROMHOST) $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://$(FROMHOST).$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName $(FROMHOST).$(DOMAINNAME)
    USE LOGGING $(FROMHOST) $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    USE SECURITY_HEADERS
    USE REWRITE2URL "$(TOHOST)"
  </VirtualHost>
</Macro>
