# ── Domain_Init / Domain_Final ───────────────────────────────────────────────
#
# Usage in your sites-enabled config:
#
#   USE Domain_Init  example.com www
#   Use VHost_Proxy_OIDC_User  myapp  example.com  http://10.0.0.1:8080/  claim 'alice|bob'
#   USE Domain_Final example.com www
#
# Domain_Init creates:
#   - HTTP→HTTPS redirect for the bare domain
#   - TOC vhost (table of contents, OIDC-protected, served by toc.lua)
#   - LOGOUT vhost (OIDC backchannel logout + redirect)
#
# Domain_Final catches all undefined subdomains and redirects to $(STDDOMAIN).$(DOMAINNAME).

MacroIgnoreEmptyArgs

<Macro Domain_Init $(DOMAINNAME) $(STDDOMAIN)>

  # Bare domain: redirect to www (or whatever STDDOMAIN is)
  <VirtualHost *:80>
    ServerName $(DOMAINNAME)
    USE LOGGING https-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName $(DOMAINNAME)
    USE LOGGING https-default $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    IncludeOptional /etc/apache2/AddOn/$(DOMAINNAME)/.pre*
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
    IncludeOptional /etc/apache2/AddOn/$(DOMAINNAME)/.post*
  </VirtualHost>

  # TOC (table of contents) — OIDC-protected overview page
  <VirtualHost *:80>
    ServerName toc.$(DOMAINNAME)
    USE LOGGING http-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://toc.$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName toc.$(DOMAINNAME)
    Alias "/tablefilter" "/var/www/res/tablefilter/dist/tablefilter"
    USE LOGGING toc $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    USE SECURITY_HEADERS
    USE CLIENTOIDC_VALIDUSER toc $(DOMAINNAME)
    ScriptAlias "/cgi/" "/var/www/cgi/"
    AddHandler lua-script .lua
    LuaScope server
    DirectoryIndex toc.lua
  </VirtualHost>

  # LOGOUT vhost — handles OIDC backchannel logout and user-facing logout page
  <VirtualHost *:80>
    ServerName logout.$(DOMAINNAME)
    USE LOGGING http-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://logout.$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName logout.$(DOMAINNAME)
    USE LOGGING logout $(DOMAINNAME)
    USE SSL $(DOMAINNAME)
    USE DEFAULTS
    USE SECURITY_HEADERS
    USE OIDCBASE logout $(DOMAINNAME)

    RewriteEngine On
    # Redirect everything to the logout endpoint except the OIDC callback and help page
    RewriteCond %{REQUEST_URI} !^/(protected|help|\.well-known/acme-challenge)(/|$) [NC]
    RewriteRule ^ /protected?logout= [R=307,L]

    # Public help/confirmation page
    Alias /help /var/www/help
    <Location /help>
      AuthType none
      Require all granted
      DirectoryIndex index.html
    </Location>

    # OIDC logout endpoint — mod_auth_openidc processes ?logout= here.
    # No <Location /> catch-all: the RewriteRule above sends a 307 redirect
    # before Apache's auth phase, so non-protected paths need no explicit grant.
    # A broad "Require all granted" on "/" would OR with "Require valid-user"
    # here and bypass the OIDC check entirely.
    <Location /protected>
      AuthType openid-connect
      Require valid-user
    </Location>

  </VirtualHost>

</Macro>


<Macro Domain_Final $(DOMAINNAME) $(STDDOMAIN)>

  # Catch-all: redirect any undefined subdomain to the standard subdomain
  <VirtualHost *:80>
    ServerName $(DOMAINNAME)
    ServerAlias *.$(DOMAINNAME)
    USE LOGGING http-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName $(DOMAINNAME)
    ServerAlias *.$(DOMAINNAME)
    USE LOGGING https-default $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
  </VirtualHost>

</Macro>

# Domain_Init_Simple $(DOMAINNAME) $(STDDOMAIN)
#
# Lightweight variant of Domain_Init for secondary domains that do NOT need
# OIDC-protected toc/logout vhosts (e.g. a second domain without its own SSO).
#
# Creates only the bare HTTP→HTTPS redirect — the catch-all is handled by
# Domain_Final as usual. No toc, no logout, no mod_auth_openidc directives.
# This avoids the OIDCCookieDomain mismatch that crashes worker processes when
# OIDC_COOKIE_DOMAIN (e.g. primary.example.com) differs from the vhost domain.
#
# Usage:
#   USE Domain_Init_Simple  secondary.example.com  www
#   Use VHost_Proxy  myapp  secondary.example.com  http://10.0.0.1:80/
#   USE Domain_Final secondary.example.com  www
<Macro Domain_Init_Simple $(DOMAINNAME) $(STDDOMAIN)>

  # Bare domain: redirect to standard subdomain
  <VirtualHost *:80>
    ServerName $(DOMAINNAME)
    USE LOGGING https-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName $(DOMAINNAME)
    USE LOGGING https-default $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    IncludeOptional /etc/apache2/AddOn/$(DOMAINNAME)/.pre*
    USE REWRITE2URL "https://$(STDDOMAIN).$(DOMAINNAME)"
    IncludeOptional /etc/apache2/AddOn/$(DOMAINNAME)/.post*
  </VirtualHost>

</Macro>


# Admin_VHost $(DOMAINNAME) $(ADMINUSER)
#
# Optional OIDC-protected admin interface for managing VHost configurations.
# Only users whose preferred_username claim matches $(ADMINUSER) are allowed.
# $(ADMINUSER) may be a pipe-separated list, e.g. 'alice|bob'.
#
# Requires sites-enabled volume to be mounted read-write so admin.lua can
# write to /etc/apache2/sites-enabled/*.conf files.
#
# Usage in your sites-enabled config (place after Domain_Init, before Domain_Final):
#   Use Admin_VHost  example.com  'alice'
<Macro Admin_VHost $(DOMAINNAME) $(ADMINUSER)>

  <VirtualHost *:80>
    ServerName admin.$(DOMAINNAME)
    USE LOGGING http-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://admin.$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName admin.$(DOMAINNAME)
    USE LOGGING admin $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    USE SECURITY_HEADERS
    USE CLIENTOIDC_CLAIM admin $(DOMAINNAME) '$(ADMINUSER)'
    DocumentRoot /var/www/html
    AddHandler lua-script .lua
    DirectoryIndex admin.lua
    <Directory /var/www/html>
      Options None
      AllowOverride None
      Require all granted
    </Directory>
    # admin-kc.lua uses the logged-in user's OIDC access_token to call the
    # Keycloak Admin REST API — so a real OIDC session is required even from
    # internal IPs (the broader <Location /> IP-bypass would leave the token empty).
    <Location /admin-kc.lua>
      AuthType openid-connect
      Require valid-user
    </Location>
  </VirtualHost>

</Macro>

# GeoLock_VHost $(DOMAINNAME)
# GeoIP-free vhost for managing extra allowed countries via PIN.
# No OIDC, no GeoIP restriction — accessible from any country.
# Disable via admin UI when not traveling; auto-disables after 3 wrong PINs.
<Macro GeoLock_VHost $(DOMAINNAME)>

  <VirtualHost *:80>
    ServerName geolock.$(DOMAINNAME)
    USE LOGGING http-default $(DOMAINNAME)
    USE DEFAULTS
    USE REWRITE2URL "https://geolock.$(DOMAINNAME)"
  </VirtualHost>

  <VirtualHost *:443>
    ServerName geolock.$(DOMAINNAME)
    USE LOGGING geolock $(DOMAINNAME)
    USE DEFAULTS
    USE SSL $(DOMAINNAME)
    USE SECURITY_HEADERS
    GeoIPEnable On
    DocumentRoot /var/www/html
    AddHandler lua-script .lua
    DirectoryIndex geolock.lua
    # Deny everything in the document root by default, then allow only geolock.lua
    # and the bare directory (which DirectoryIndex resolves to geolock.lua).
    # <Files> cannot be used here because Apache evaluates <Directory> before
    # resolving DirectoryIndex, causing 403 on "/". <LocationMatch> is processed
    # after <Directory> and correctly overrides the deny for these two paths.
    <Directory /var/www/html>
      Options None
      AllowOverride None
      Require all denied
    </Directory>
    <LocationMatch "^/(geolock\.lua)?$">
      Require all granted
    </LocationMatch>
  </VirtualHost>

</Macro>
