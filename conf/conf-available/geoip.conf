# Enable GeoIP globally so SetEnvIf can reliably read GEOIP_COUNTRY_CODE.
#
# Problem: GeoIPEnable On at VirtualHost level registers mod_geoip with
# APR_HOOK_LAST in header_parser. mod_setenvif runs at APR_HOOK_MIDDLE —
# before GeoIP — so GEOIP_COUNTRY_CODE is not yet set when SetEnvIf tries
# to match it. AllowCountry never gets set → 403 instead of 401.
#
# Fix: global enable moves the lookup to post_read_request (phase 1),
# before header_parser (phase 4) where SetEnvIf runs.
GeoIPEnable On
