# Internal Apache server-info endpoint — always active, baked into the image.
# Bound to 127.0.0.1:81 only; never reachable from outside the container.
# Exposed externally at /server-info on the admin.DOMAIN vhost (Admin_VHost macro).
<VirtualHost 127.0.0.1:81>
  ServerName apacheinfo.internal
  <Location />
    SetHandler server-info
    Require all granted
  </Location>
</VirtualHost>
