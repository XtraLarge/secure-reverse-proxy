# Internal Apache server-info endpoint — always active, cannot be disabled via sites-enabled.
# Bound to 127.0.0.1:81 only; never reachable from outside the container.
# Proxied to the outside world via VHost_Proxy_OIDC_User in your domain config:
#   Use VHost_Proxy_OIDC_User  apacheinfo  example.com  http://127.0.0.1:81/  'admin'
<VirtualHost 127.0.0.1:81>
  ServerName apacheinfo.internal
  <Location />
    SetHandler server-info
  </Location>
</VirtualHost>
