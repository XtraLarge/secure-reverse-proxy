# Admin-managed VHost configurations
# Written by the admin.DOMAIN web interface (www/admin.lua).
# Do NOT edit manually — use the admin UI instead.
#
# This directory is separate from sites-enabled/ so that manually maintained
# system configs (e.g. for apacheinfo, secondary domains) are not exposed
# to the web admin interface.
IncludeOptional /etc/apache2/sites-admin/*.conf
