# Domain configs managed via the admin web UI (admin.DOMAIN).
# This directory is separate from sites-enabled/ so that manually maintained
# system configs (apacheinfo, secondary helper VHosts, etc.) are never
# exposed to or accidentally overwritten by the admin interface.
#
# Mount as a read-write volume in docker-compose:
#   - /data/proxy/sites-admin:/etc/apache2/sites-admin:rw
IncludeOptional /etc/apache2/sites-admin/*.conf
