# mod_evasive — basic DoS/brute-force mitigation
#
# Limits rapid repeated requests from a single IP to the same URI.
# Triggered clients receive 403 for DOSBlockingPeriod seconds.
#
# Thresholds are intentionally permissive so normal browser behaviour
# (page reload, parallel asset fetches) is not affected, while bot-level
# flooding (hundreds of requests per second) is blocked.
#
# For stricter protection, lower DOSPageCount and DOSSiteCount.
# For OIDC flows, the redirect path (/protected) is the most sensitive
# endpoint — browsers hit it once per session, not repeatedly.

<IfModule mod_evasive20.c>
    DOSHashTableSize      2048
    # Block if same page is requested more than N times in DOSPageInterval
    DOSPageCount          10
    DOSPageInterval       2
    # Block if site is requested more than N times in DOSSiteInterval
    DOSSiteCount          100
    DOSSiteInterval       2
    # How long (seconds) a blocked IP is locked out
    DOSBlockingPeriod     30
    # Log blocked IPs to syslog
    DOSLogDir             /var/log/apache2
    # Optional: send email alert — set to a real address to enable
    # DOSEmailNotify  admin@example.com
    # Optional: run a script on block — set path to enable
    # DOSSystemCommand  /usr/local/bin/block-ip.sh
    # Whitelist localhost and Docker bridge (health checks, internal traffic)
    DOSWhitelist          127.0.0.1
    DOSWhitelist          172.16.*.*
    DOSWhitelist          172.17.*.*
    DOSWhitelist          172.22.*.*
    DOSWhitelist          10.*.*.*
</IfModule>
