# ACME HTTP-01 challenge webroot
#
# Serves challenge tokens that certbot writes to /var/www/acme-webroot/.
# certbot is invoked with:  --webroot -w /var/www/acme-webroot
#
# All HTTP vhosts use DocumentRoot /var/www/html (via the DEFAULTS macro) and
# the REWRITE2URL macro already excludes /.well-known/acme-challenge/ from
# the HTTP→HTTPS redirect.  This Alias maps the challenge path to the dedicated
# directory so DocumentRoot contents are never exposed.
#
# Enabled unconditionally — harmless when ACME is not used (directory is empty).
Alias /.well-known/acme-challenge /var/www/acme-webroot
<Directory "/var/www/acme-webroot">
    Options None
    AllowOverride None
    Require all granted
</Directory>
