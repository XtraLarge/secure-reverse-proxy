# ── Apache error log → syslog ─────────────────────────────────────────────────
#
# All vhosts inherit this global ErrorLog unless they override it.
# rsyslog (started by entrypoint.sh) receives local7.* and routes it to:
#   - a consolidated file  (LOG_FILE env var, default /var/log/apache2/apache.log)
#   - a remote syslog server (SYSLOG_REMOTE env var, e.g. udp://10.x.x.x:514)
#
# Set LOG_FILE=off to disable local file logging entirely.
# Set SYSLOG_REMOTE=udp://host:514 (or tcp://host:514) to enable remote forwarding.
#
# The format includes the virtual hostname (%v) so you can grep by site:
#   grep "toc.example.com" /var/log/apache2/apache.log

ErrorLog syslog:local7
ErrorLogFormat "[%v] [%t] [%-m:%l] [pid %P] %M"
LogLevel warn
