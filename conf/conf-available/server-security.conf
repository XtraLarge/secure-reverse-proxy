# Hide Apache version from response headers and error pages
ServerTokens Prod
ServerSignature Off

# Disable directory listings globally; enable explicitly per DocumentRoot if needed
<Directory /var/www/>
  Options -Indexes +FollowSymLinks
  AllowOverride None
  Require all granted
</Directory>

# Global TLS defaults — individual VHosts override these via the SSL macro.
# These apply as fallback if a VHost omits SSL directives.
SSLProtocol -all +TLSv1.2 +TLSv1.3
SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
SSLHonorCipherOrder off
SSLSessionTickets off

# Optional runtime override generated by entrypoint.sh
IncludeOptional /etc/apache2/conf-runtime/servername.conf
