# Global performance and protocol tuning
#
# Overrides Debian defaults from apache2.conf and mods-enabled/http2.conf.

# Remove h2c (HTTP/2 cleartext) — only h2 over TLS is needed.
# All port-80 VHosts redirect immediately; cleartext HTTP/2 is unnecessary.
Protocols h2 http/1.1

# Lower global connection timeout from Debian default (300s).
# Per-VHost proxy timeouts are set in the PROXY macro.
Timeout 60

# Recycle worker processes after N requests to contain long-term memory growth.
# 0 (Debian default) means never recycle.
MaxConnectionsPerChild 10000
