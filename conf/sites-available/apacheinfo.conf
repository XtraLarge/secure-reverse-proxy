# Internal Apache server-info endpoint
# Exposed on localhost:81 only — proxied via VHost_Proxy_OIDC in your domain config.
#
# Example usage in your domain site config:
#   Use VHost_Proxy_OIDC  apacheinfo  example.com  http://127.0.0.1:81/  claim  'admin'

<VirtualHost 127.0.0.1:81>
  ServerAdmin webmaster@localhost
  DocumentRoot /var/www/html
  ErrorLog ${APACHE_LOG_DIR}/error.log
  CustomLog ${APACHE_LOG_DIR}/access.log combined

  <Location />
    SetHandler server-info
  </Location>
</VirtualHost>
