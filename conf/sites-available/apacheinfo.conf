# Apache server-info proxy vhost
#
# The internal server-info endpoint runs on 127.0.0.1:81 and is always active
# (enabled via conf-available/apacheinfo-internal.conf — cannot be disabled).
#
# To expose it externally via OIDC, add this to your domain site config:
#   Use VHost_Proxy_OIDC_User  apacheinfo  example.com  http://127.0.0.1:81/  'admin'
