# ── Example domain configuration ─────────────────────────────────────────────
#
# Copy this file to your sites/ directory and adapt it.
# All macro definitions come from /etc/apache2/macro/*.conf (baked into the image).
# OIDC settings (provider, client, Redis, etc.) come from environment variables.
#
# Prerequisites:
#   1. TLS certs in ssl/example.com/{cert,key,fullchain}.pem
#   2. DNS: *.example.com → this host
#   3. OIDC provider client "Proxy" configured with redirect URI:
#      https://*.example.com/protected
#
# ─────────────────────────────────────────────────────────────────────────────

# Domain_Init creates:
#   https://example.com           → https://www.example.com
#   https://toc.example.com       → OIDC-protected table of contents (toc.lua)
#   https://logout.example.com    → OIDC logout handler
USE Domain_Init example.com www


# ── Public aliases (no auth) ──────────────────────────────────────────────────
Use VHOST_ALIAS   www    example.com  https://cms.internal/
Use VHOST_ALIAS   files  example.com  https://files.internal/


# ── OIDC-protected reverse proxies ───────────────────────────────────────────
#
# VHost_Proxy_OIDC $(SITENAME) $(DOMAINNAME) $(DESTINATION) $(USERS) $(GROUPS)
#   Users and groups are pipe-separated, matched case-insensitively (OR logic).
#   Pass '' to skip one side.

# Users only
Use VHost_Proxy_OIDC  mgmt  example.com  http://10.0.0.6:9000/   'alice|bob'  ''
Use VHost_Proxy_OIDC  dms   example.com  http://10.0.0.7:8000/   'alice'      ''

# Backend over HTTPS with a self-signed certificate.
# Use an AddOn snippet (AddOn/example.com/backup.preconfig) to disable SSL peer checks:
#   SSLProxyVerify none
#   SSLProxyCheckPeerCN off
#   SSLProxyCheckPeerName off
#   SSLProxyCheckPeerExpire off
Use VHost_Proxy_OIDC  backup  example.com  https://10.0.0.8:8443/   'alice'     ''

# Groups only
Use VHost_Proxy_OIDC  monitor  example.com  http://10.0.0.5:3000/   ''  'editors'

# Users AND groups (OR logic — either is sufficient)
Use VHost_Proxy_OIDC  tools  example.com  http://10.0.0.9:8080/   'alice'  'editors'


# ── Basic auth proxies ────────────────────────────────────────────────────────
# For services where OIDC is not suitable (e.g. API clients, legacy apps).
# Requires /etc/apache2/config/basic.htpasswd inside the container.
# Use VHost_Proxy_Basic  cam  example.com  http://10.0.0.9:8081/  user  'camuser'


# ── Unauthenticated proxies ───────────────────────────────────────────────────
# For services that handle their own authentication (identity provider, CMS, etc.)
# or are only reachable from trusted internal networks.
Use VHost_Proxy  idp  example.com  https://10.0.0.10:443/
Use VHost_Proxy  cms  example.com  http://10.0.0.11:80/


# ── Admin interface ───────────────────────────────────────────────────────────
# Optional: OIDC-protected VHost management UI at https://admin.example.com
# Only the listed user(s) can log in. Requires sites/ volume read-write.
# Use Admin_VHost  example.com  'alice'


# Domain_Final catches all undefined *.example.com and redirects to www.example.com
USE Domain_Final example.com www
